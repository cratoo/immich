name: Build Extended Immich Server Image

on:
  schedule:
    - cron: '0 6 * * *'   # fallback: check daily 6:00 UTC
  image_version:
    names:
      - "ghcr.io/immich-app/immich-server"
    versions:
      - "v*"
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if image already exists'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get latest upstream release
        id: release
        run: |
          VERSION=$(curl -s https://api.github.com/repos/immich-app/immich/releases/latest \
            | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Upstream version: $VERSION"

      - name: Check if already built
        id: check
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          FOUND=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/immich-server/versions" \
            | jq -r --arg TAG "$VERSION" 'map(select(.metadata.container.tags | index($TAG))) | length')
          if [ "${FOUND:-0}" -gt "0" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Image $VERSION already exists, skipping"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "New version $VERSION, will build"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true' || inputs.force == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: extended
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream release tag
        run: |
          git remote add upstream https://github.com/immich-app/immich.git
          git fetch upstream ${{ needs.check.outputs.version }} --no-tags
          git merge FETCH_HEAD \
            --no-edit \
            -m "chore: merge upstream ${{ needs.check.outputs.version }}"

      - name: Push merged branch
        run: git push origin extended

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich-server:${{ needs.check.outputs.version }}
          build-args: |
            BUILD_ID=${{ github.run_id }}
            BUILD_IMAGE=ghcr.io/${{ github.repository_owner }}/immich-server:${{ needs.check.outputs.version }}
            BUILD_SOURCE_REF=extended
            BUILD_SOURCE_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false
